<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retro RPG Header</title>

<style>
  @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap");

  :root {
    /* 与此前组件统一的颜色和材质 */
    --page-bg: #9cabad;

    --frame-dark: #192020;
    --frame-deep: #101616;
    --frame-light: #a7b3b4;

    --dark-fill: #202323;
    --light-fill: #e5e9e9;
    --teal-fill: #72b4b8;
  }

  * {
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    margin: 0;
    padding: 48px;

    display: grid;
    place-items: center;

    background-color: var(--page-bg);
  }

  .header-showcase {
    width: min(820px, 100%);
    display: grid;
    gap: 28px;
  }

  /* ==============================
     RPG Header 基础组件
     ============================== */

  rpg-header {
    --header-fill: var(--dark-fill);
    --header-text: #f1f3f3;
    --ornament-color: #647070;
    --middle-frame: var(--frame-light);
    --pattern-color: rgba(255, 255, 255, 0.045);

    display: block;
    width: 100%;

    cursor: default;
  }

  rpg-header svg {
    display: block;
    width: 100%;
    height: auto;
    overflow: visible;

    shape-rendering: geometricPrecision;
  }

  /* 暗色 */
  rpg-header[variant="dark"] {
    --header-fill: #202323;
    --header-text: #f0f2f2;
    --ornament-color: #596464;
    --middle-frame: #778485;
    --pattern-color: rgba(255, 255, 255, 0.045);
  }

  /* 亮色 */
  rpg-header[variant="light"] {
    --header-fill: #e5e9e9;
    --header-text: #303636;
    --ornament-color: #566060;
    --middle-frame: #a9b4b5;
    --pattern-color: rgba(31, 45, 46, 0.075);
  }

  /* 青色 */
  rpg-header[variant="teal"] {
    --header-fill: #72b4b8;
    --header-text: #233031;
    --ornament-color: #264344;
    --middle-frame: #8ca3a4;
    --pattern-color: rgba(25, 62, 64, 0.09);
  }
</style>
</head>

<body>

<main class="header-showcase">
  <rpg-header variant="dark" label="Header"></rpg-header>
  <rpg-header variant="light" label="Header"></rpg-header>
  <rpg-header variant="teal" label="Header"></rpg-header>
</main>

<script>
  class RPGHeader extends HTMLElement {
    connectedCallback() {
      const label = this.getAttribute("label") || "Header";
      const uid = `rpg-header-${Math.random().toString(36).slice(2)}`;

      /*
       * 主体路径结构：
       *
       * M 18 9
       * 顶部直线至右端
       * 右侧使用贝塞尔曲线向内收束
       * 底边进入中央燕尾
       * 再从左侧曲线返回顶部
       */
      const mainPath = `
        M 18 9
        H 642

        C 624 14, 612 24, 603 40
        C 596 52, 593 63, 592 73

        H 383
        L 330 103
        L 277 73
        H 68

        C 67 62, 64 51, 57 39
        C 48 23, 36 14, 18 9

        Z
      `;

      /*
       * 底部暗托略微向下错位，
       * 用来模拟参考图中的厚度与阴影。
       */
      const shadowPath = `
        M 18 13
        H 642

        C 624 18, 612 28, 603 44
        C 596 56, 593 67, 592 77

        H 383
        L 330 107
        L 277 77
        H 68

        C 67 66, 64 55, 57 43
        C 48 27, 36 18, 18 13

        Z
      `;

      this.innerHTML = `
        <svg
          viewBox="0 0 660 116"
          role="img"
          aria-label="${label}"
        >
          <defs>
            <!-- 菱形暗纹 -->
            <pattern
              id="${uid}-pattern"
              width="42"
              height="42"
              patternUnits="userSpaceOnUse"
            >
              <path
                d="M21 0 L42 21 L21 42 L0 21 Z"
                fill="var(--pattern-color)"
              />
              <path
                d="M21 10 L32 21 L21 32 L10 21 Z"
                fill="rgba(255,255,255,0.035)"
              />
            </pattern>
            <!-- 两端清晰、中央消失 -->
            <linearGradient
              id="${uid}-fade"
              x1="0"
              y1="0"
              x2="1"
              y2="0"
            >
              <stop
                offset="0%"
                stop-color="white"
                stop-opacity="1"
              />
              <stop
                offset="24%"
                stop-color="white"
                stop-opacity=".55"
              />
              <stop
                offset="39%"
                stop-color="white"
                stop-opacity="0"
              />
              <stop
                offset="61%"
                stop-color="white"
                stop-opacity="0"
              />
              <stop
                offset="76%"
                stop-color="white"
                stop-opacity=".55"
              />
              <stop
                offset="100%"
                stop-color="white"
                stop-opacity="1"
              />
            </linearGradient>
            <mask id="${uid}-mask">
              <rect
                width="660"
                height="116"
                fill="url(#${uid}-fade)"
              />
            </mask>
            <clipPath id="${uid}-clip">
              <path d="${mainPath}" />
            </clipPath>
          </defs>
          <!-- 底部暗托 -->
          <path
            d="${shadowPath}"
            fill="#0d1212"
            opacity=".72"
          />
          <!-- 面板主体 -->
          <path
            d="${mainPath}"
            fill="var(--header-fill)"
          />
          <!-- 左右渐隐菱形暗纹 -->
          <rect
            x="12"
            y="6"
            width="636"
            height="102"
            fill="url(#${uid}-pattern)"
            mask="url(#${uid}-mask)"
            clip-path="url(#${uid}-clip)"
          />
          <!-- ===========================
               深—浅—深三重边框
               =========================== -->
          <!-- 外层深色粗边 -->
          <path
            d="${mainPath}"
            fill="none"
            stroke="var(--frame-dark)"
            stroke-width="7"
            stroke-linejoin="miter"
          />
          <!-- 中间浅色边线 -->
          <path
            d="${mainPath}"
            fill="none"
            stroke="var(--middle-frame)"
            stroke-width="4"
            stroke-linejoin="miter"
          />
          <!-- 内层深色边线 -->
          <path
            d="${mainPath}"
            fill="none"
            stroke="var(--frame-deep)"
            stroke-width="2"
            stroke-linejoin="miter"
          />
          <!-- ===========================
               内部装饰线
               =========================== -->
          <!-- 顶部内线 -->
          <path
            d="
              M 39 15
              H 621
            "
            fill="none"
            stroke="var(--ornament-color)"
            stroke-width="1"
            opacity=".72"
          />
          <!-- 左侧内弧线 -->
          <path
            d="
              M 39 15
              C 52 22, 61 33, 67 47
              C 71 56, 73 64, 73 68
            "
            fill="none"
            stroke="var(--ornament-color)"
            stroke-width="1.25"
            opacity=".88"
          />
          <!-- 右侧内弧线 -->
          <path
            d="
              M 621 15
              C 608 22, 599 33, 593 47
              C 589 56, 587 64, 587 68
            "
            fill="none"
            stroke="var(--ornament-color)"
            stroke-width="1.25"
            opacity=".88"
          />
          <!-- 底边与中央内层燕尾 -->
          <path
            d="
              M 73 68
              H 283
              L 330 94
              L 377 68
              H 587
            "
            fill="none"
            stroke="var(--ornament-color)"
            stroke-width="1.25"
            stroke-linejoin="miter"
            opacity=".9"
          />
          <!-- 中央燕尾中的第二层装饰 -->
          <path
            d="
              M 293 72
              L 330 92
              L 367 72
            "
            fill="none"
            stroke="var(--ornament-color)"
            stroke-width=".8"
            stroke-linejoin="miter"
            opacity=".62"
          />
          <!-- ===========================
               装饰铆钉
               =========================== -->
          <g fill="var(--ornament-color)">
            <!-- 顶边定位点 -->
            <circle cx="91" cy="15" r="1.25"/>
            <circle cx="569" cy="15" r="1.25"/>
            <!-- 弧线末端定位点 -->
            <circle cx="73" cy="68" r="1.25"/>
            <circle cx="587" cy="68" r="1.25"/>
            <!-- 中央三枚菱形装饰 -->
            <path
              d="M316 80 L320 84 L316 88 L312 84 Z"
            />
            <path
              d="M330 88 L334 92 L330 96 L326 92 Z"
            />
            <path
              d="M344 80 L348 84 L344 88 L340 84 Z"
            />
          </g>
          <!-- 标题文字 -->
          <text
            x="330"
            y="47"
            fill="var(--header-text)"
            font-family="Cinzel, Georgia, serif"
            font-size="24"
            font-weight="500"
            letter-spacing="2.5"
            text-anchor="middle"
            dominant-baseline="middle"
          >
            ${label}
          </text>
        </svg>
      `;
    }
  }

  customElements.define("rpg-header", RPGHeader);
</script>

</body>
</html>
