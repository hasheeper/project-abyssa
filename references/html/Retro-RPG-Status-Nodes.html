<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retro RPG Status Nodes</title>

<style>
  :root {
    --page-bg: #a5b0b1;

    /* 通用边框材质 */
    --frame-outer: #182020;
    --frame-middle: #899697;
    --frame-inner: #111717;

    --line-dark: #4c5657;
    --line-light: #c3cccc;
  }

  * {
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    margin: 0;
    padding: 40px;

    display: grid;
    place-items: center;

    background: var(--page-bg);
  }

  .status-list {
    display: grid;
    gap: 10px;
  }

  /* ========================================
     单个状态节点
     ======================================== */

  .status-node {
    --node-fill: #717777;
    --node-middle: #667172;
    --node-inner-line: #4d5657;
    --icon-color: #505858;
    --axis-color: #6e797a;

    display: block;
    width: 86px;
    height: 54px;

    margin: 0;
    padding: 0;
    border: 0;
    background: transparent;

    cursor: pointer;

    transition:
      transform 80ms ease,
      filter 100ms ease;
  }

  .status-node:hover {
    filter: brightness(1.07);
  }

  .status-node:active {
    transform: scale(0.97);
  }

  .status-node:focus-visible {
    outline: 2px solid #edf1f1;
    outline-offset: 3px;
    border-radius: 6px;
  }

  .status-node svg {
    display: block;
    width: 100%;
    height: 100%;
    overflow: visible;

    shape-rendering: geometricPrecision;
  }

  /* 灰色禁用状态 */
  .variant-disabled {
    --node-fill: #747a7a;
    --node-middle: #626d6e;
    --node-inner-line: #535c5d;
    --icon-color: #515a5b;
    --axis-color: #737e7f;
  }

  /* 暗色确认状态 */
  .variant-dark {
    --node-fill: #1a1f1f;
    --node-middle: #a5b0b1;
    --node-inner-line: #606c6d;
    --icon-color: #edf1f1;
    --axis-color: #667172;
  }

  /* 青色确认状态 */
  .variant-teal {
    --node-fill: #63b5ba;
    --node-middle: #718d8f;
    --node-inner-line: #356466;
    --icon-color: #183f41;
    --axis-color: #5f7779;
  }
</style>
</head>

<body>

<main class="status-list">
  <rpg-status-node
    variant="disabled"
    icon="close"
    label="不可用"
  ></rpg-status-node>

  <rpg-status-node
    variant="dark"
    icon="check"
    label="已确认"
  ></rpg-status-node>

  <rpg-status-node
    variant="teal"
    icon="check"
    label="已选中"
  ></rpg-status-node>
</main>

<script>
  class RPGStatusNode extends HTMLElement {
    connectedCallback() {
      const variant = this.getAttribute("variant") || "disabled";
      const icon = this.getAttribute("icon") || "check";
      const label = this.getAttribute("label") || "状态节点";

      this.innerHTML = `
        <button
          class="status-node variant-${variant}"
          type="button"
          aria-label="${label}"
        >
          <svg
            viewBox="0 0 86 54"
            aria-hidden="true"
          >
            <!--
              节点后方的水平装饰线。
              先绘制装饰线，再绘制圆形节点，
              因此线条不会穿过圆形内部。
            -->
            <path
              d="M2 27 H84"
              fill="none"
              stroke="var(--frame-outer)"
              stroke-width="3.2"
              stroke-linecap="round"
            />
            <path
              d="M2 25.8 H84"
              fill="none"
              stroke="var(--line-light)"
              stroke-width="0.8"
              stroke-linecap="round"
              opacity=".58"
            />
            <!-- 节点主体 -->
            <circle
              cx="43"
              cy="27"
              r="20"
              fill="var(--node-fill)"
            />
            <!-- 深—浅—深三层边框 -->
            <circle
              cx="43"
              cy="27"
              r="20"
              fill="none"
              stroke="var(--frame-outer)"
              stroke-width="6"
            />
            <circle
              cx="43"
              cy="27"
              r="20"
              fill="none"
              stroke="var(--node-middle)"
              stroke-width="3.2"
            />
            <circle
              cx="43"
              cy="27"
              r="20"
              fill="none"
              stroke="var(--frame-inner)"
              stroke-width="1.3"
            />
            <!-- 内侧装饰圆环 -->
            <circle
              cx="43"
              cy="27"
              r="15.5"
              fill="none"
              stroke="var(--node-inner-line)"
              stroke-width="1"
              opacity=".85"
            />
            <!-- 状态图标 -->
            ${this.renderIcon(icon)}
          </svg>
        </button>
      `;
    }

    renderIcon(icon) {
      if (icon === "close") {
        return `
          <g
            fill="none"
            stroke="var(--icon-color)"
            stroke-width="2.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M37 21 L49 33"/>
            <path d="M49 21 L37 33"/>
          </g>
        `;
      }

      return `
        <path
          d="M34.5 27 L40.5 33 L51.5 21.5"
          fill="none"
          stroke="var(--icon-color)"
          stroke-width="3.4"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      `;
    }
  }

  customElements.define(
    "rpg-status-node",
    RPGStatusNode
  );
</script>

</body>
</html>
