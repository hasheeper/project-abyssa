<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retro RPG Notched Pill Buttons</title>

<style>
  @import url(
    "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Serif+SC:wght@500&display=swap"
  );

  :root {
    --page-bg: #9cabad;

    /* 统一的深—浅—深边框 */
    --frame-outer: #182020;
    --frame-middle: #899697;
    --frame-inner: #111717;

    --fill-dark: #1d2121;
    --fill-light: #e4e8e8;
    --fill-teal: #70b7bb;

    --text-light: #eef2f2;
    --text-dark: #202727;
  }

  * {
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    margin: 0;
    padding: 40px;

    display: grid;
    place-items: center;

    background: var(--page-bg);
  }

  .button-showcase {
    width: 190px;

    display: grid;
    gap: 7px;
  }

  /* ========================================
     带内部 V 形翻折的胶囊按钮
     ======================================== */

  .notched-pill-button {
    --button-fill: var(--fill-dark);
    --button-text: var(--text-light);
    --button-middle: #718081;
    --button-ornament: #566162;

    --pattern-dark: rgba(255, 255, 255, 0.035);
    --pattern-light: rgba(255, 255, 255, 0.012);

    display: block;
    width: 100%;
    height: 48px;

    margin: 0;
    padding: 0;
    border: 0;
    background: transparent;

    cursor: pointer;
    font: inherit;

    transition:
      transform 80ms ease,
      filter 100ms ease;
  }

  .notched-pill-button:hover {
    filter: brightness(1.07);
  }

  .notched-pill-button:active {
    transform: translateY(1px) scale(0.99);
  }

  .notched-pill-button:focus-visible {
    outline: 2px solid #edf2f2;
    outline-offset: 3px;
    border-radius: 999px;
  }

  .notched-pill-button svg {
    display: block;
    width: 100%;
    height: 100%;
    overflow: visible;

    shape-rendering: geometricPrecision;
  }

  .button-label {
    fill: var(--button-text);

    font-family:
      "Cormorant Garamond",
      "Noto Serif SC",
      Georgia,
      serif;

    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.7px;

    text-anchor: middle;
    dominant-baseline: middle;
  }

  /* ========================================
     三种主题
     ======================================== */

  .theme-dark {
    --button-fill: #1c2020;
    --button-text: #eef2f2;
    --button-middle: #718081;
    --button-ornament: #515c5d;

    --pattern-dark: rgba(255, 255, 255, 0.035);
    --pattern-light: rgba(255, 255, 255, 0.01);
  }

  .theme-light {
    --button-fill: #e4e8e8;
    --button-text: #323939;
    --button-middle: #9ba7a8;
    --button-ornament: #687374;

    --pattern-dark: rgba(38, 58, 59, 0.07);
    --pattern-light: rgba(255, 255, 255, 0.20);
  }

  .theme-teal {
    --button-fill: #70b7bb;
    --button-text: #203334;
    --button-middle: #778f90;
    --button-ornament: #315253;

    --pattern-dark: rgba(26, 70, 73, 0.095);
    --pattern-light: rgba(255, 255, 255, 0.08);
  }
</style>
</head>

<body>

<main class="button-showcase">

  <rpg-notched-pill
    variant="dark"
    label="Auto"
  ></rpg-notched-pill>

  <rpg-notched-pill
    variant="light"
    label="Auto"
  ></rpg-notched-pill>

  <rpg-notched-pill
    variant="teal"
    label="Auto"
  ></rpg-notched-pill>

</main>

<script>
  class RPGNotchedPill extends HTMLElement {
    connectedCallback() {
      const variant = this.getAttribute("variant") || "dark";
      const label = this.getAttribute("label") || "Auto";
      const uid = `pill-${Math.random().toString(36).slice(2)}`;

      /*
       * 外部胶囊始终保持完整。
       * 底边没有缺口，也没有向下延伸的三角。
       */
      const outerPath = `
        M 24 5
        H 166

        A 19 19 0 0 1 185 24
        A 19 19 0 0 1 166 43

        H 24

        A 19 19 0 0 1 5 24
        A 19 19 0 0 1 24 5

        Z
      `;

      /*
       * 内侧装饰框。
       *
       * 胶囊正常底边位于 y=37；
       * 中央从 x=88 开始下折；
       * 尖端位于 (95,41)；
       * 再于 x=102 回到底边。
       *
       * 最外侧底部位于 y=43，
       * 所以 V 形尖端仍留在外框内部。
       */
      const ornamentPath = `
        M 25 11
        H 165

        A 13 13 0 0 1 178 24
        A 13 13 0 0 1 165 37

        H 102
        L 95 41
        L 88 37

        H 25

        A 13 13 0 0 1 12 24
        A 13 13 0 0 1 25 11

        Z
      `;

      this.innerHTML = `
        <button
          class="notched-pill-button theme-${variant}"
          type="button"
          aria-label="${label}"
        >
          <svg
            viewBox="0 0 190 48"
            aria-hidden="true"
          >
            <defs>
              <!-- 低对比度菱形暗纹 -->
              <pattern
                id="${uid}-pattern"
                width="26"
                height="26"
                patternUnits="userSpaceOnUse"
                patternTransform="translate(0 -2)"
              >
                <path
                  d="M13 0 L26 13 L13 26 L0 13 Z"
                  fill="var(--pattern-dark)"
                />
                <path
                  d="M13 6 L20 13 L13 20 L6 13 Z"
                  fill="var(--pattern-light)"
                />
              </pattern>
              <!-- 左右明显、中央文字区域淡出 -->
              <linearGradient
                id="${uid}-fade"
                x1="0"
                y1="0"
                x2="1"
                y2="0"
              >
                <stop
                  offset="0%"
                  stop-color="white"
                  stop-opacity="1"
                />
                <stop
                  offset="25%"
                  stop-color="white"
                  stop-opacity=".45"
                />
                <stop
                  offset="40%"
                  stop-color="white"
                  stop-opacity="0"
                />
                <stop
                  offset="60%"
                  stop-color="white"
                  stop-opacity="0"
                />
                <stop
                  offset="75%"
                  stop-color="white"
                  stop-opacity=".45"
                />
                <stop
                  offset="100%"
                  stop-color="white"
                  stop-opacity="1"
                />
              </linearGradient>
              <mask id="${uid}-mask">
                <rect
                  width="190"
                  height="48"
                  fill="url(#${uid}-fade)"
                />
              </mask>
              <clipPath id="${uid}-clip">
                <path d="${outerPath}"/>
              </clipPath>
            </defs>
            <!-- 完整胶囊主体 -->
            <path
              d="${outerPath}"
              fill="var(--button-fill)"
            />
            <!-- 两侧渐隐暗纹 -->
            <rect
              x="3"
              y="3"
              width="184"
              height="42"
              fill="url(#${uid}-pattern)"
              mask="url(#${uid}-mask)"
              clip-path="url(#${uid}-clip)"
            />
            <!-- =================================
                 外部三重边框
                 底部始终保持完整圆弧
                 ================================= -->
            <path
              d="${outerPath}"
              fill="none"
              stroke="var(--frame-outer)"
              stroke-width="7"
              stroke-linejoin="round"
            />
            <path
              d="${outerPath}"
              fill="none"
              stroke="var(--button-middle)"
              stroke-width="3.7"
              stroke-linejoin="round"
            />
            <path
              d="${outerPath}"
              fill="none"
              stroke="var(--frame-inner)"
              stroke-width="1.3"
              stroke-linejoin="round"
            />
            <!-- =================================
                 内部装饰框
                 只有这一圈出现中央 V 形翻折
                 ================================= -->
            <path
              d="${ornamentPath}"
              fill="none"
              stroke="var(--button-ornament)"
              stroke-width="1"
              stroke-linecap="round"
              stroke-linejoin="round"
              opacity=".88"
            />
            <!-- 居中文字 -->
            <text
              class="button-label"
              x="95"
              y="24"
            >
              ${label}
            </text>
          </svg>
        </button>
      `;
    }
  }

  customElements.define(
    "rpg-notched-pill",
    RPGNotchedPill
  );
</script>

</body>
</html>
